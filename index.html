function mkAudio(){
  let ctx=null;
  const gc=()=>{if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();if(ctx.state==='suspended')ctx.resume();return ctx;};
  const tone=(freq,type,dur,vol=0.18,sweep=0)=>{try{const c=gc(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=type;o.frequency.setValueAtTime(freq,c.currentTime);if(sweep)o.frequency.exponentialRampToValueAtTime(Math.max(freq+sweep,10),c.currentTime+dur);g.gain.setValueAtTime(0,c.currentTime);g.gain.linearRampToValueAtTime(vol,c.currentTime+0.01);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);o.start();o.stop(c.currentTime+dur+0.01);}catch(e){}};
  const noise=(dur,vol=0.1,fq=800)=>{try{const c=gc(),n=Math.ceil(c.sampleRate*dur),buf=c.createBuffer(1,n,c.sampleRate),d=buf.getChannelData(0);for(let i=0;i<n;i++)d[i]=Math.random()*2-1;const s=c.createBufferSource(),g=c.createGain(),f=c.createBiquadFilter();f.type='bandpass';f.frequency.value=fq;s.buffer=buf;s.connect(f);f.connect(g);g.connect(c.destination);g.gain.setValueAtTime(vol,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);s.start();}catch(e){}};
  return{
    fire:()=>{tone(340,'square',0.09,0.13,-90);},
    wildFire:()=>{tone(900,'triangle',0.12,0.16);setTimeout(()=>tone(1200,'sine',0.09,0.14),55);},
    blocked:()=>{tone(180,'square',0.08,0.08,-40);},
    hit:()=>{noise(0.07,0.09,650);},
    destroy:()=>{tone(680,'sine',0.18,0.16,120);noise(0.06,0.07,1100);},
    rainbow:()=>{tone(55,'sawtooth',0.5,0.25);noise(0.38,0.18,180);},
    win:()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,'sine',0.35,0.17),i*115));},
    lose:()=>{[370,280,200,140].forEach((f,i)=>setTimeout(()=>tone(f,'sawtooth',0.3,0.17),i*145));},
    lvlUp:()=>{[523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>tone(f,'sine',0.28,0.18),i*95));},
  };
}

function pip(px,py,poly){
  let ins=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){const[xi,yi]=poly[i],[xj,yj]=poly[j];if((yi>py)!==(yj>py)&&px<(xj-xi)*(py-yi)/(yj-yi)+xi)ins=!ins;}
  return ins;
}

function computeConsts(rows,cols,availW){
  const usable=Math.max((availW||window.innerWidth)-24,200);
  const rawCell=(usable-(cols-1)*GAP)/(3.44+cols);
  const capCell=cols<=5?52:cols<=8?48:cols<=11?40:cols<=13?34:30;
  const CELL=Math.min(capCell,Math.max(12,Math.floor(rawCell)));
  const PAD=Math.round(CELL*1.72),OINSET=Math.round(CELL*0.62);
  const GW=cols*(CELL+GAP)-GAP,GH=rows*(CELL+GAP)-GAP;
  const CW=PAD*2+GW,CH=PAD*2+GH;
  const OX=OINSET,OY=OINSET,OW=CW-2*OINSET,OH=CH-2*OINSET,PERIM=2*(OW+OH);
  const cx=c=>PAD+c*(CELL+GAP)+CELL/2,cy=r=>PAD+r*(CELL+GAP)+CELL/2;
  function pathXY(d){
    d=((d%PERIM)+PERIM)%PERIM;
    if(d<OW)return{x:OX+d,y:OY};d-=OW;
    if(d<OH)return{x:OX+OW,y:OY+d};d-=OH;
    if(d<OW)return{x:OX+OW-d,y:OY+OH};d-=OW;
    return{x:OX,y:OY+OH-d};
  }
  const FIRE_PTS=[
    ...Array.from({length:cols},(_,c)=>({dist:cx(c)-OX,side:'top',col:c})),
    ...Array.from({length:rows},(_,r)=>({dist:OW+(cy(r)-OY),side:'right',row:r})),
    ...Array.from({length:cols},(_,c)=>({dist:OW+OH+(OX+OW-cx(cols-1-c)),side:'bottom',col:cols-1-c})),
    ...Array.from({length:rows},(_,r)=>({dist:2*OW+OH+(OY+OH-cy(rows-1-r)),side:'left',row:rows-1-r})),
  ].sort((a,b)=>a.dist-b.dist);
  return{CELL,PAD,OINSET,GW,GH,CW,CH,OX,OY,OW,OH,PERIM,cx,cy,pathXY,FIRE_PTS};
}

function genGrid(shape,lv=1){
  const{rows,cols,cells}=shape;
  const grid=Array.from({length:rows},()=>Array(cols).fill(null));
  const active=[];
  const L=Math.min(lv,20);
  const maxHp=Math.min(2+Math.floor(L*0.75),14);
  const pow=Math.max(0.25,L/10);
  const weights=Array.from({length:maxHp},(_,i)=>Math.pow(i+1,pow));
  const wSum=weights.reduce((a,b)=>a+b,0);
  const thresholds=[];let cum=0;
  for(let i=0;i<maxHp;i++){cum+=weights[i]/wSum;thresholds.push(cum);}
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    if(cells[r][c]){
      const rng=Math.random();let hp=1;
      for(let t=0;t<thresholds.length;t++){if(rng<thresholds[t]){hp=t+1;break;}}
      grid[r][c]={color:Math.random()*4|0,hp,type:'normal'};active.push({r,c});
    }
  }
  const cr=rows/2,cc=cols/2;
  const rainCnt=Math.max(1,Math.floor(active.length*0.04));
  [...active].sort((a,b)=>(Math.abs(a.r-cr)+Math.abs(a.c-cc))-(Math.abs(b.r-cr)+Math.abs(b.c-cc)))
    .slice(0,Math.ceil(active.length*0.4)).sort(()=>Math.random()-0.5)
    .slice(0,rainCnt).forEach(({r,c})=>{grid[r][c]={color:-1,hp:1,type:'rainbow'};});
  return grid;
}

function buildCols(grid,shape,lv=1){
  const{rows,cols,cells}=shape;
  const L=Math.min(lv,20);
  const ammoBase=2+Math.floor(L*0.7);
  const ammoRange=2+Math.floor(L*0.85);
  const wildChance=Math.max(0,(L-2)*0.022);
  const cnt=[0,0,0,0];
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)
    if(cells[r][c]&&grid[r][c]&&grid[r][c].type==='normal')cnt[grid[r][c].color]+=grid[r][c].hp;
  const pool=[];
  for(let col=0;col<4;col++){
    let rem=cnt[col];
    while(rem>0){const a=Math.min((Math.random()*ammoRange|0)+ammoBase,rem);pool.push({id:uid(),color:col,ammo:a,wild:false});rem-=a;}
  }
  for(let i=pool.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[pool[i],pool[j]]=[pool[j],pool[i]];}
  for(let i=0;i<6;i++){
    const isWild=Math.random()<wildChance;
    pool.push({id:uid(),color:isWild?-1:Math.random()*4|0,ammo:(Math.random()*ammoRange|0)+ammoBase,wild:isWild});
  }
  pool.forEach(s=>{if(!s.wild&&Math.random()<wildChance){s.wild=true;s.color=-1;}});
  const out=[[],[],[]];pool.forEach((s,i)=>out[i%3].push(s));
  return out.map(col=>col.map((s,si)=>({...s,hidden:si>0&&Math.random()<0.35})));
}

function getTarget(grid,shape,fp,color,wild){
  const{rows,cols,cells}=shape;
  const chk=(r,c)=>{
    if(!cells[r]||!cells[r][c])return undefined;if(!grid[r][c])return undefined;
    const t=grid[r][c].type;
    if(t==='rainbow')return{r,c,special:'rainbow'};
    if(t==='normal'&&(wild||grid[r][c].color===color))return{r,c,special:null};
    return null;
  };
  if(fp.side==='top')       {for(let r=0;r<rows;r++)    {const t=chk(r,fp.col);if(t!==undefined)return t;}}
  else if(fp.side==='bottom'){for(let r=rows-1;r>=0;r--){const t=chk(r,fp.col);if(t!==undefined)return t;}}
  else if(fp.side==='right') {for(let c=cols-1;c>=0;c--){const t=chk(fp.row,c);if(t!==undefined)return t;}}
  else                       {for(let c=0;c<cols;c++)    {const t=chk(fp.row,c);if(t!==undefined)return t;}}
  return null;
}

function drawCanvas(canvas,ctR,animObjs){
  const ct=ctR.current;if(!canvas||!ct)return false;
  const{CW,CH}=ct,ctx=canvas.getContext('2d'),now=performance.now();
  ctx.clearRect(0,0,CW,CH);
  const a=animObjs.current;let active=a.orbs.size>0;
  for(let i=a.parts.length-1;i>=0;i--){
    const p=a.parts[i],prog=(now-p.start)/580;
    if(prog>=1){a.parts.splice(i,1);continue;}active=true;
    const pal=p.wild?WILD_PAL:PAL[p.col%4];
    ctx.globalAlpha=1-prog;ctx.fillStyle=pal.bg;ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=5;
    ctx.beginPath();ctx.arc(p.ox+p.ptx*prog,p.oy+p.pty*prog,p.sz*(1-prog*0.4),0,Math.PI*2);ctx.fill();
  }
  for(let i=a.pops.length-1;i>=0;i--){
    const p=a.pops[i],prog=(now-p.start)/420;
    if(prog>=1){a.pops.splice(i,1);continue;}active=true;
    const pal=p.wild?WILD_PAL:PAL[p.color%4];
    ctx.globalAlpha=1-prog;ctx.strokeStyle=pal.bg;ctx.shadowColor=ctx.strokeStyle;
    ctx.shadowBlur=10;ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(p.x,p.y,26*(1+prog*1.4),0,Math.PI*2);ctx.stroke();
  }
  ctx.shadowBlur=0;
  a.bullets.forEach(b=>{
    const prog=Math.min((now-b.start)/200,1);if(prog<1)active=true;
    const x=b.sx+(b.tx-b.sx)*prog,y=b.sy+(b.ty-b.sy)*prog;
    const pal=b.wild?WILD_PAL:PAL[b.color%4];
    ctx.globalAlpha=1;ctx.fillStyle=pal.bg;ctx.shadowColor=pal.bg;ctx.shadowBlur=b.wild?18:12;
    ctx.beginPath();ctx.arc(x,y,b.wild?8:6,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=pal.border;ctx.lineWidth=2;ctx.shadowBlur=0;ctx.stroke();
  });
  a.orbs.forEach(o=>{
    const pal=o.wild?WILD_PAL:PAL[o.color%4];
    ctx.globalAlpha=1;ctx.shadowColor=pal.bg;ctx.shadowBlur=o.wild?28:20;
    ctx.beginPath();ctx.arc(o.x,o.y,o.wild?20:18,0,Math.PI*2);
    ctx.fillStyle=pal.bg;ctx.fill();
    ctx.strokeStyle=pal.border;ctx.lineWidth=o.wild?3:2.5;ctx.stroke();
    ctx.shadowBlur=0;ctx.fillStyle=o.wild?'#1A202C':'#fff';
    ctx.font=`bold ${o.wild?12:13}px system-ui`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=3;
    if(o.wild){ctx.fillText('✶',o.x,o.y-7);ctx.font='bold 11px system-ui';ctx.fillText(o.ammo,o.x,o.y+6);}
    else ctx.fillText(o.ammo,o.x,o.y);
  });
  for(let i=a.popups.length-1;i>=0;i--){
    const p=a.popups[i],prog=(now-p.start)/980;
    if(prog>=1){a.popups.splice(i,1);continue;}active=true;
    ctx.globalAlpha=prog<0.65?1:(1-(prog-0.65)/0.35);
    ctx.fillStyle=p.big?'#FC8181':'#ECC94B';
    ctx.font=`bold ${p.big?14:12}px system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='rgba(0,0,0,0.9)';ctx.shadowBlur=6;ctx.fillText(p.txt,p.x,p.y-prog*50);
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;return active;
}

  useEffect(()=>{
    const reflow=()=>{if(!shR.current||acR.current>0)return;const ct=computeConsts(shR.current.rows,shR.current.cols,window.innerWidth);ctR.current=ct;setCtSt(ct);if(canvasRef.current){canvasRef.current.width=ct.CW;canvasRef.current.height=ct.CH;}};

    const lv=store.get('sf3-level',1);const lvi=typeof lv==='number'?Math.max(1,lv):1;setLevel(lvi);lvR.current=lvi;
    return()=>{if(rafR.current)cancelAnimationFrame(rafR.current);};

    scR.current=ns;setScores(ns);store.set('sf3-scores',ns);

  const endGame=useCallback(reason=>{

      const{PERIM,FIRE_PTS,pathXY,cx,cy}=ctR.current;
      const shape=shR.current,done=[];
      orbR.current.forEach((orb,id)=>{
        const old=orb.dist;orb.dist+=SPEED*dt/1000;
        for(const fp of FIRE_PTS){
          if(fp.dist<=old||fp.dist>orb.dist||orb.ammo<=0)continue;
          const tgt=getTarget(gR.current,shape,fp,orb.color,orb.wild);if(!tgt)continue;
          const cell=gR.current[tgt.r]?.[tgt.c];if(!cell)continue;
          const src=pathXY(fp.dist),bid=uid(),tx=cx(tgt.c),ty=cy(tgt.r);

            const eKeys=new Set([tgt.r+'-'+tgt.c]);
            for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
              if(!dr&&!dc)continue;const nr=tgt.r+dr,nc=tgt.c+dc;

            orb.ammo--;checkEnd();if(resR.current)return;

        displayWaiting.map((s,i)=>
          h('div',{key:s?s.id:'empty-'+i,style:{animation:s?'slideInRight 0.22s cubic-bezier(0.34,1.56,0.64,1)':'none',flexShrink:0}},
            h(Ball,{s,size:ballSz,mode:s?(orbsFull?'locked':'active'):null,onClick:s&&!result&&!orbsFull?()=>fireFromWait(s,i):null})
          )
        )
      )
    ),
    h('div',{style:{width:CW,marginTop:uiGap,display:'flex',gap:uiGap}},
      sCols.map((col,ci)=>h('div',{key:ci,style:{flex:1,background:T.colBg,borderRadius:12,padding:`8px ${Math.max(4,uiGap-2)}px`,display:'flex',flexDirection:'column',alignItems:'center',gap:uiGap-2,border:T.colBd,minWidth:0,transition:'background 0.3s'}},
        h('div',{style:{fontSize:labelSz-1,fontWeight:700,color:T.colLblC,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:1}},['A','B','C'][ci]),
        col.length===0?h('div',{style:{color:T.emptyColC,fontSize:10,padding:'4px 0'}},'—'):
          col.slice(0,4).map((s,si)=>
            h('div',{key:s.id,style:{animation:si===0?'slideInRight 0.22s cubic-bezier(0.34,1.56,0.64,1)':'none',flexShrink:0}},
              h(Ball,{s,size:ballSz,mode:si===0?(orbsFull?'locked':'active'):s.hidden?'hidden':'dim',onClick:!result&&si===0&&!orbsFull?()=>fire(s,ci):null})
            )
          )
      ))
    )
  ));
}

ReactDOM.createRoot(document.getElementById('root')).render(h(SquareFlow,null));
</script>
</body>
</html>
